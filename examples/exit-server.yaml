# Rootless egress server. WireGuard peers can route Internet traffic here, and
# uwgsocks terminates inbound TCP/UDP to normal host sockets.
wireguard:
  config_file: ./examples/server.conf

acl:
    inbound: []
    inbound_default: allow
    outbound:
        - action: deny
          destination: 10.0.0.0/8
        - action: deny
          destination: 172.16.0.0/12
        - action: deny
          destination: 192.168.0.0/16
        - action: deny
          destination: fc00::/7
    outbound_default: allow
    relay: []
    relay_default: allow
api:
    listen: unix://uwgsocks.sock
    token: ""
dns_server:
    listen: 100.64.90.1:53
inbound:
    transparent: true
proxy:
    socks5: 0.0.0.0:1081
    udp_associate: true
relay:
    enabled: false
transports:
    - base: udp
      listen: true
      listen_port: 51821
      name: udp
