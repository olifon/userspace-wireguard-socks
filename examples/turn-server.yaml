# Rootless egress server. WireGuard peers can route Internet traffic here, and
# uwgsocks terminates inbound TCP/UDP to normal host sockets.

# See the turn folder for the TURN server.

wireguard:
  config_file: ./examples/server.conf

turn:
  server: 127.0.0.1:3478 #Put to your real turn server IP
  realm: local-turn.example
  username: wireguard
  password: super-secret-turn-password
  # Hidden-server ingress mode: rely on relay-side permission_behavior and
  # source_networks instead of creating static TURN permissions here.
  no_create_permission: true

inbound:
  transparent: true

dns_server:
  # Tunnel-side DNS listener. This is not a host port 53 bind.
  listen: 100.64.90.1:53

api:
  listen: 127.0.0.1:9090
  token: demo-api-token-change-me

acl:
  inbound_default: allow
  outbound_default: allow
  relay_default: deny
