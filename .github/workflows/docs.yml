name: docs

on:
  push:
    branches:
      - '**'
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'examples/**'
      - 'turn/README.md'
      - 'tests/check_docs.py'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
      - 'examples/**'
      - 'turn/README.md'
      - 'tests/check_docs.py'

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 tests/check_docs.py
