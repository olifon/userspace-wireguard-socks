name: Release Builds

on:
  push:
    tags:
      - '*'
      - '*/*'

permissions:
  contents: write

jobs:
  build-uwgsocks:
    name: uwgsocks ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgwrapper:
    name: uwgwrapper linux ${{ matrix.goarch }} ${{ matrix.libc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            libc: gnu
            zig_target: x86_64-linux-gnu
            artifact_name: uwgwrapper-linux-amd64-gnu
          - goarch: amd64
            libc: musl
            zig_target: x86_64-linux-musl
            artifact_name: uwgwrapper-linux-amd64-musl
          - goarch: arm64
            libc: gnu
            zig_target: aarch64-linux-gnu
            artifact_name: uwgwrapper-linux-arm64-gnu
          - goarch: arm64
            libc: musl
            zig_target: aarch64-linux-musl
            artifact_name: uwgwrapper-linux-arm64-musl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build uwgwrapper preload asset
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          zig cc -target ${{ matrix.zig_target }} -shared -fPIC -O2 -Wall -Wextra \
            -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread

      - name: Build uwgwrapper
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgwrapper

      - name: Show artifact details
        run: |
          ls -lh dist cmd/uwgwrapper/assets
          file "dist/${{ matrix.artifact_name }}" || true
          file cmd/uwgwrapper/assets/uwgpreload.so || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-uwgsocks
      - build-uwgwrapper
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release contents
        run: ls -lh dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
