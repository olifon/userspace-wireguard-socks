name: Release Builds

on:
  push:
    tags:
      - '*'
      - '*/*'

permissions:
  contents: write
  packages: write

jobs:
  release-test:
    name: release test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run tests
        if: runner.os != 'Linux'
        shell: bash
        run: go test ./...

      - name: Run tests (Linux core)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '/tests/preload$')
          go test "${packages[@]}"

      - name: Run tests (Linux preload retry)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          go test ./tests/preload/... || go test ./tests/preload/...

      - name: Run standalone TURN tests
        shell: bash
        run: |
          set -euo pipefail
          cd turn
          go test ./...

      - name: Real Linux host-TUN smoke test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            -e UWG_TEST_REAL_TUN=1 \
            -v "$PWD":/src -w /src golang:1.25 \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOFLAGS=-buildvcs=false && apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && /bin/bash ./compile.sh >/dev/null && go test ./internal/tun -run TestRealLinuxTUNConfigureSmallRoute -count=1'

      - name: Real macOS host-TUN smoke test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          sudo env UWG_TEST_REAL_TUN=1 go test ./internal/tun -run TestRealUTUNConfigureSmallRoute -count=1

      - name: Install Wintun
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          $dir = Join-Path $env:RUNNER_TEMP 'wintun'
          Invoke-WebRequest -Uri 'https://www.wintun.net/builds/wintun-0.14.1.zip' -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dir -Force
          Copy-Item (Join-Path $dir 'wintun\\bin\\amd64\\wintun.dll') 'C:\\Windows\\System32\\wintun.dll' -Force

      - name: Real Windows host-TUN smoke test
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:UWG_TEST_REAL_TUN = '1'
          go test ./internal/tun -run TestRealWindowsTUNConfigureSmallRoute -count=1

      - name: Run soak test
        shell: bash
        run: |
          set -euo pipefail
          UWGS_SOAK=1 UWGS_SOAK_SECONDS=15 go test ./tests/soak -run TestLoopbackImpairedChattySOCKSSoak -count=1

  release-test-lite:
    name: release lite ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux uwgwrapper preload asset (glibc)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
              apt-get update >/dev/null && apt-get install -y gcc libc6-dev >/dev/null && \
              mkdir -p cmd/uwgwrapper/assets && \
              gcc -shared -fPIC -O2 -Wall -Wextra \
                -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Run lite tests
        shell: bash
        run: go test -tags lite ./...

  build-uwgsocks:
    name: uwgsocks ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgsocks-lite:
    name: uwgsocks-lite ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-lite-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-lite-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: uwgsocks-lite-linux-riscv64
          - goos: linux
            goarch: mips
            artifact_name: uwgsocks-lite-linux-mips
          - goos: linux
            goarch: mipsle
            artifact_name: uwgsocks-lite-linux-mipsle
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-lite-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-lite-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: uwgsocks-lite-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: uwgsocks-lite-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: uwgsocks-lite-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: uwgsocks-lite-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-lite-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-lite-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build uwgsocks-lite
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -tags lite -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgsocks

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-turn:
    name: turn ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: turn-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: turn-linux-arm64
          - goos: linux
            goarch: riscv64
            artifact_name: turn-linux-riscv64
          - goos: linux
            goarch: mips64
            artifact_name: turn-linux-mips64
          - goos: darwin
            goarch: amd64
            artifact_name: turn-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: turn-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: turn-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: turn-freebsd-arm64
          - goos: openbsd
            goarch: amd64
            artifact_name: turn-openbsd-amd64
          - goos: openbsd
            goarch: arm64
            artifact_name: turn-openbsd-arm64
          - goos: windows
            goarch: amd64
            artifact_name: turn-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: turn-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: turn/go.mod

      - name: Build turn
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd turn
          go build -trimpath -ldflags='-s -w' -o "../dist/${{ matrix.artifact_name }}" .

      - name: Show artifact details
        run: |
          ls -lh dist
          file "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgwrapper:
    name: uwgwrapper linux ${{ matrix.goarch }} ${{ matrix.libc }}
    runs-on: ${{ matrix.runner }}
    needs:
      - release-test
      - release-test-lite
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            libc: gnu
            runner: ubuntu-latest
            zig_target: x86_64-linux-gnu
            artifact_name: uwgwrapper-linux-amd64-gnu
          - goarch: amd64
            libc: musl
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
            artifact_name: uwgwrapper-linux-amd64-musl
          - goarch: arm64
            libc: gnu
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-gnu
            artifact_name: uwgwrapper-linux-arm64-gnu
          - goarch: arm64
            libc: musl
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
            artifact_name: uwgwrapper-linux-arm64-musl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      # Run preload and wrapper tests before building the release artifact.
      # gnu: run tests on the host runner, but build the shipped preload asset later in
      #      a bullseye container for an older glibc baseline.
      # musl: test inside a Docker golang:alpine container so LD_PRELOAD resolves against musl.
      - name: Test preload and wrapper (gnu)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          go test ./internal/uwgtrace/... ./internal/fdproxy/...
          go test ./tests/preload/... || go test ./tests/preload/...

      - name: Test preload and wrapper (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          # golang:alpine uses musl; tests must run inside it so LD_PRELOAD resolves against musl.
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            --cap-add SYS_PTRACE \
            --security-opt seccomp=unconfined \
            golang:alpine \
            sh -c "apk add --no-cache gcc musl-dev linux-headers && \
                   mkdir -p cmd/uwgwrapper/assets && \
                   gcc -shared -fPIC -O2 -Wall -Wextra \
                     -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread && \
                   go test ./internal/uwgtrace/... ./internal/fdproxy/... && \
                   (go test ./tests/preload/... || go test ./tests/preload/...)"
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (gnu baseline)
        if: matrix.libc == 'gnu'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            golang:1.24-bullseye \
            bash -lc 'export PATH=/usr/local/go/bin:$PATH GOTOOLCHAIN=auto && \
                     apt-get update >/dev/null && \
                     apt-get install -y gcc libc6-dev >/dev/null && \
                     gcc -shared -fPIC -O2 -Wall -Wextra \
                       -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread'
          sudo chown -R "$(id -u):$(id -g)" cmd/uwgwrapper/assets

      - name: Build uwgwrapper preload asset (musl)
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          mkdir -p cmd/uwgwrapper/assets dist
          zig cc -target ${{ matrix.zig_target }} -shared -fPIC -O2 -Wall -Wextra \
            -o cmd/uwgwrapper/assets/uwgpreload.so preload/uwgpreload.c -ldl -pthread -lpthread

      - name: Build uwgwrapper
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact_name }}" ./cmd/uwgwrapper

      - name: Show artifact details
        run: |
          ls -lh dist cmd/uwgwrapper/assets
          file "dist/${{ matrix.artifact_name }}" || true
          file cmd/uwgwrapper/assets/uwgpreload.so || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-uwgsocks
      - build-uwgsocks-lite
      - build-turn
      - build-uwgwrapper
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release contents
        run: ls -lh dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-container-uwgsocks:
    name: publish uwgsocks container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-container-turn:
    name: publish turn container
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uwgsocks-turn
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./turn/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
